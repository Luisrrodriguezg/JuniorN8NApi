services:
  api:
    build: .
    container_name: junior-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - junior-net
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: junior-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - junior-net
    restart: unless-stopped

volumes:
  n8n-data:

networks:
  junior-net:
    driver: bridge